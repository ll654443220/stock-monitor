<script>
let _sid = 0;

// ‚ĒÄ‚ĒÄ Load script tag (for APIs that set global vars) ‚ĒÄ‚ĒÄ
function loadScript(url) {
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        const t = setTimeout(() => { s.remove(); reject(new Error('timeout')); }, 15000);
        s.onload = () => { clearTimeout(t); s.remove(); resolve(); };
        s.onerror = () => { clearTimeout(t); s.remove(); reject(new Error('network')); };
        s.src = url + (url.includes('?') ? '&' : '?') + '_t=' + (++_sid);
        document.head.appendChild(s);
    });
}

// ‚ĒÄ‚ĒÄ JSONP loader (for APIs that support ?callback=xxx) ‚ĒÄ‚ĒÄ
function loadJSONP(url) {
    return new Promise((resolve, reject) => {
        const cb = '_cb_' + (++_sid);
        const t = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 15000);
        function cleanup() { clearTimeout(t); delete window[cb]; const el = document.getElementById(cb); if (el) el.remove(); }
        window[cb] = (data) => { cleanup(); resolve(data); };
        const s = document.createElement('script');
        s.id = cb;
        const sep = url.includes('?') ? '&' : '?';
        s.src = `${url}${sep}callback=${cb}&_t=${_sid}`;
        s.onerror = () => { cleanup(); reject(new Error('network')); };
        document.head.appendChild(s);
    });
}

// ‚ĒÄ‚ĒÄ Fetch JSON (for APIs with CORS: *, like Tencent & Sina hot) ‚ĒÄ‚ĒÄ
async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}

// ‚ĒÄ‚ĒÄ State ‚ĒÄ‚ĒÄ
let state = { sectors:[], indices:[], currentSort:'changePct', currentSectorCode:null };

function fmt(n,d=2){if(n==null||isNaN(n))return'-';return Number(n).toFixed(d)}
function fmtAmount(n){if(!n)return'-';const a=Math.abs(n);if(a>=1e8)return(n/1e8).toFixed(2)+'šļŅ';if(a>=1e4)return(n/1e4).toFixed(2)+'šłá';return n.toFixed(0)}
function cc(v){return v>0?'up':v<0?'down':'flat'}
function sign(v){return v>0?'+':''}

// ‚ĒÄ‚ĒÄ Indices: Tencent API (CORS: *), multi-quote ‚ĒÄ‚ĒÄ
async function loadIndices() {
    try {
        const codes = 'sh000001,sz399001,sz399006,sh000688,sh000300,sz399303';
        const names = {sh000001:'šłäŤĮĀśĆáśēį',sz399001:'ś∑ĪŤĮĀśąźśĆá',sz399006:'ŚąõšłöśĚŅśĆá',sh000688:'ÁßĎŚąõ50',sh000300:'ś≤™ś∑Ī300',sz399303:'ŚõĹŤĮĀ2000'};
        const r = await fetch(`https://qt.gtimg.cn/q=${codes}`);
        const text = await r.text();
        const results = [];
        for (const line of text.split(';')) {
            const m = line.match(/v_(\w+)="(.+?)"/);
            if (!m) continue;
            const parts = m[2].split('~');
            if (parts.length < 40) continue;
            const code = m[1];
            const price = +parts[3] || 0, prev = +parts[4] || 0;
            results.push({
                code, name: names[code] || parts[1],
                price, prevClose: prev, open: +parts[5] || 0,
                change: price - prev,
                changePct: prev ? ((price - prev) / prev * 100) : 0,
                high: +parts[33] || 0, low: +parts[34] || 0,
                volume: +parts[36] || 0, turnover: +parts[37] || 0
            });
        }
        if (results.length) { state.indices = results; renderIndices(); }
        else throw new Error('no data');
    } catch(e) {
        console.warn('indices error:', e);
        document.getElementById('indices').innerHTML = '<div style="padding:12px;color:var(--text2);font-size:13px">śĆáśēįŚä†ŤĹĹŚ§ĪŤī•</div>';
    }
}

function renderIndices() {
    document.getElementById('indices').innerHTML = state.indices.map(idx => `
        <div class="index-card ${cc(idx.changePct)}">
            <div class="idx-name">${idx.name}</div>
            <div class="idx-price ${cc(idx.changePct)}">${fmt(idx.price)}</div>
            <div class="idx-change ${cc(idx.changePct)}">${sign(idx.changePct)}${fmt(idx.changePct)}%</div>
        </div>
    `).join('');
}

// ‚ĒÄ‚ĒÄ Sectors: Sina sets global var (no CORS, no JSONP) ‚ĒÄ‚ĒÄ
async function loadSectors() {
    try {
        await loadScript('https://vip.stock.finance.sina.com.cn/q/view/newSinaHy.php');
        const raw = window.S_Finance_bankuai_sinaindustry;
        if (!raw || typeof raw !== 'object') throw new Error('no data');
        const sectors = [];
        for (const [k, v] of Object.entries(raw)) {
            const p = v.split(',');
            if (p.length < 13) continue;
            sectors.push({
                code:p[0], name:p[1], stockCount:+p[2]||0,
                avgPrice:+p[3]||0, change:+p[4]||0, changePct:+p[5]||0,
                volume:+p[6]||0, turnover:+p[7]||0,
                leadStockCode:p[8], leadStockChangePct:+p[9]||0,
                leadStockPrice:+p[10]||0, leadStockChange:+p[11]||0,
                leadStockName:p[12]
            });
        }
        sectors.sort((a,b) => Math.abs(b.changePct) - Math.abs(a.changePct));
        state.sectors = sectors;
        const now = new Date();
        document.getElementById('autoStatus').textContent = `śõīśĖį ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        renderSectors();
    } catch(e) {
        console.warn('sectors error:', e);
        document.getElementById('sectorList').innerHTML = '<div class="empty"><div class="empty-icon">‚ö†ÔłŹ</div><div>śēįśćģŚä†ŤĹĹŚ§ĪŤī•ÔľĆŤĮ∑Śą∑śĖįťáćŤĮē</div></div>';
    }
}

function renderSectors() {
    const sorted = [...state.sectors];
    if (state.currentSort === 'turnover') sorted.sort((a,b) => b.turnover - a.turnover);
    else sorted.sort((a,b) => Math.abs(b.changePct) - Math.abs(a.changePct));
    document.getElementById('sectorList').innerHTML = sorted.map(s => `
        <div class="sector-item" onclick="openSector('${s.code}','${s.name}')">
            <div>
                <div class="sector-name">${s.name}<span class="sector-count">${s.stockCount}ŚŹ™</span></div>
                <div class="sector-lead">ťĘÜś∂®Ôľö${s.leadStockName} ${sign(s.leadStockChangePct)}${fmt(s.leadStockChangePct)}%</div>
            </div>
            <div class="sector-price"><div>${fmt(s.avgPrice)}</div><div style="font-size:11px;color:var(--text2)">śąźšļ§ ${fmtAmount(s.turnover)}</div></div>
            <div class="sector-change ${cc(s.changePct)}">${sign(s.changePct)}${fmt(s.changePct)}%</div>
        </div>
    `).join('');
}

// ‚ĒÄ‚ĒÄ Sector Detail: Sina supports JSONP callback ‚ĒÄ‚ĒÄ
async function openSector(code, name) {
    switchTab('detail');
    state.currentSectorCode = code;
    document.getElementById('detailHeader').innerHTML = `<span>${name} ¬∑ śąźŚąÜŤā°</span>`;
    document.getElementById('detailList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
        const data = await loadJSONP(`https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page=1&num=50&sort=changepercent&asc=0&node=${code}&symbol=&_s_r_a=page`);
        if (!data || !data.length) {
            document.getElementById('detailList').innerHTML = '<div class="empty"><div class="empty-icon">ūüėī</div><div>śöāśó†śēįśćģ</div></div>';
            return;
        }
        document.getElementById('detailList').innerHTML = data.map(s => {
            const c = s.code.startsWith('6') ? 'sh' : 'sz';
            const ch = +s.changepercent || 0;
            return `<div class="stock-row" onclick="openStockFull('${c}${s.code}','${s.name}')">
                <div><div class="stock-name">${s.name}</div><div class="stock-code">${s.code}</div></div>
                <div class="stock-price ${cc(ch)}">${fmt(+s.trade)}</div>
                <div class="stock-change ${cc(ch)}">${sign(ch)}${fmt(ch)}%</div>
            </div>`;
        }).join('');
    } catch(e) {
        document.getElementById('detailList').innerHTML = '<div class="empty"><div class="empty-icon">‚ö†ÔłŹ</div><div>Śä†ŤĹĹŚ§ĪŤī•</div></div>';
    }
}

// ‚ĒÄ‚ĒÄ Money Flow: CORS not set, no global var, use iframe+eval trick ‚ĒÄ‚ĒÄ
async function loadMoneyFlow() {
    try {
        // Method: load as script, the JSON array [ {...}, {...} ] will fail to parse as JS
        // Workaround: use fetch with a workaround
        // Since this API has no CORS headers, we need script tag approach
        // The response is JSON array which isn't valid JS expression on its own
        // Trick: we override Array constructor temporarily to capture the array
        const captured = [];
        const origArray = window.Array;
        let captured_data = null;

        // Override the global scope to capture JSON array
        // JSON array literal [...] will be parsed as array expression
        // We set window[0] to check if an array was created
        window._mf_capture = null;

        // Use Object.defineProperty to intercept array creation at global scope
        // Actually simpler: the JSON starts with [, which IS valid JS (array literal)
        // But it's a statement expression, not an assignment
        // In non-strict mode, it will be created and immediately GC'd
        // We can't capture it easily

        // Best approach: just fetch via a CORS-enabling trick
        // Use Tencent stock flow API instead (has CORS)
        // Or accept this limitation

        // Fallback: show sector flow from Tencent data we already have
        // Let's try one more thing: use the Sina industry flow with fenlei=0
        const url = 'https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/MoneyFlow.ssl_bkzj_bk?page=1&num=20&sort=netamount&asc=0&fenlei=1';

        // Actually, let's try: create a temporary variable name that the JSON array might overwrite
        // Nope, JSON array literal doesn't set any variable

        // Final approach: use script tag with error handler, and read from network timing
        // This won't work either

        // REAL solution: use the Sina _var trick
        // Try adding &_var=myVar to make it set a global variable
        try {
            await loadScript(url + '&_var=_mfData');
            if (window._mfData && typeof window._mfData === 'object') {
                renderMoneyFlow(Array.isArray(window._mfData) ? window._mfData : []);
                delete window._mfData;
                return;
            }
        } catch(e) {}

        // If all else fails, show a helpful message
        document.getElementById('flowList').innerHTML = '<div class="empty"><div class="empty-icon">ūüíį</div><div>ŤĶĄťáĎśĶĀŚźĎśēįśćģśöāšłćŚŹĮÁĒ®<br><small style="color:var(--text2)">APIŤ∑®ŚüüťôźŚą∂ÔľĆŤĮ∑šĹŅÁĒ®„ÄĆśĚŅŚĚóŤ°ĆśÉÖ„Äćśü•ÁúčśĚŅŚĚóś∂®Ť∑Ć</small></div></div>';
    } catch(e) {
        document.getElementById('flowList').innerHTML = '<div class="empty"><div class="empty-icon">‚ö†ÔłŹ</div><div>Śä†ŤĹĹŚ§ĪŤī•</div></div>';
    }
}

function renderMoneyFlow(data) {
    const el = document.getElementById('flowList');
    if (!data || !data.length) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">ūüíį</div><div>śöāśó†śēįśćģ</div></div>';
        return;
    }
    const maxAbs = Math.max(...data.map(d => Math.abs(+d.netamount || 0)));
    el.innerHTML = data.map(d => {
        const net = +d.netamount || 0, buy = +d.r0_net || 0, sell = +d.r3_net || 0;
        const pct = Math.min(Math.abs(net) / maxAbs * 100, 100);
        return `<div class="flow-item">
            <div>
                <div style="font-size:14px;font-weight:600">${d.name}</div>
                <div class="flow-bar-container"><div class="flow-bar ${net > 0 ? 'inflow' : 'outflow'}" style="width:${pct}%"></div></div>
                <div class="flow-sub">šłĽŚäõ ${fmtAmount(buy)} ¬∑ śē£śą∑ ${fmtAmount(sell)}</div>
            </div>
            <div class="flow-amount ${cc(net)}">${sign(net)}${fmtAmount(net)}</div>
        </div>`;
    }).join('');
}

// ‚ĒÄ‚ĒÄ Hot Stocks: CORS: * so we can use fetch ‚ĒÄ‚ĒÄ
async function loadHot() {
    try {
        const data = await fetchJSON('https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page=1&num=20&sort=changepercent&asc=0&node=hs_a&symbol=&_s_r_a=page');
        const el = document.getElementById('hotList');
        if (!data || !data.length) {
            el.innerHTML = '<div class="empty"><div class="empty-icon">ūüĒ•</div><div>śöāśó†śēįśćģ</div></div>';
            return;
        }
        el.innerHTML = data.map((s, i) => {
            const c = s.code.startsWith('6') ? 'sh' : 'sz';
            const ch = +s.changepercent || 0;
            return `<div class="hot-item" onclick="openStockFull('${c}${s.code}','${s.name}')">
                <div class="hot-rank ${i < 3 ? 'top' : 'normal'}">${i + 1}</div>
                <div><div class="stock-name">${s.name}</div><div class="stock-code">${s.code}</div></div>
                <div class="stock-price ${cc(ch)}">${fmt(+s.trade)}</div>
                <div class="stock-change ${cc(ch)}">${sign(ch)}${fmt(ch)}%</div>
            </div>`;
        }).join('');
    } catch(e) {
        console.warn('hot error:', e);
        document.getElementById('hotList').innerHTML = '<div class="empty"><div class="empty-icon">‚ö†ÔłŹ</div><div>Śä†ŤĹĹŚ§ĪŤī•</div></div>';
    }
}

// ‚ĒÄ‚ĒÄ Stock Detail: Tencent (sets global var) ‚ĒÄ‚ĒÄ
async function openStockFull(fullCode, name) {
    document.getElementById('stockModal').classList.add('show');
    document.getElementById('modalName').textContent = name || 'Śä†ŤĹĹšł≠...';
    document.getElementById('modalCode').textContent = fullCode;
    document.getElementById('modalPrice').textContent = '-';
    document.getElementById('modalChange').textContent = '-';
    document.getElementById('modalStats').innerHTML = '';
    try {
        await loadScript(`https://qt.gtimg.cn/q=${fullCode}`);
        const raw = window['v_' + fullCode];
        if (!raw) { document.getElementById('modalName').textContent = 'śú™śČĺŚąį'; return; }
        const parts = raw.split('~');
        if (parts.length < 40) { document.getElementById('modalName').textContent = 'śēįśćģŚľāŚłł'; return; }
        const d = {
            code: parts[2], name: parts[1],
            price: +parts[3] || 0, prevClose: +parts[4] || 0, open: +parts[5] || 0,
            change: +parts[31] || 0, changePct: +parts[32] || 0,
            high: +parts[33] || 0, low: +parts[34] || 0,
            volume: +parts[36] || 0, turnover: +parts[37] || 0,
            pe: parts[39] || '-', marketCap: parts[45] || '-'
        };
        const cls = cc(d.changePct);
        document.getElementById('modalName').textContent = d.name;
        document.getElementById('modalCode').textContent = d.code;
        const pe = document.getElementById('modalPrice');
        pe.textContent = fmt(d.price); pe.className = 'modal-price ' + cls;
        const ce = document.getElementById('modalChange');
        ce.textContent = `${sign(d.changePct)}${fmt(d.changePct)}%  ${sign(d.change)}${fmt(d.change)}`;
        ce.className = 'modal-change ' + cls;
        ce.style.background = cls === 'up' ? 'var(--red-bg)' : cls === 'down' ? 'var(--green-bg)' : 'transparent';
        document.getElementById('modalStats').innerHTML = `
            <div class="stat-box"><div class="stat-label">šĽäŚľÄ</div><div class="stat-value">${fmt(d.open)}</div></div>
            <div class="stat-box"><div class="stat-label">śė®śĒ∂</div><div class="stat-value">${fmt(d.prevClose)}</div></div>
            <div class="stat-box"><div class="stat-label">śúÄťęė</div><div class="stat-value ${cc(d.high-d.prevClose)}">${fmt(d.high)}</div></div>
            <div class="stat-box"><div class="stat-label">śúÄšĹé</div><div class="stat-value ${cc(d.low-d.prevClose)}">${fmt(d.low)}</div></div>
            <div class="stat-box"><div class="stat-label">śąźšļ§ťáŹ</div><div class="stat-value">${fmtAmount(d.volume)}śČč</div></div>
            <div class="stat-box"><div class="stat-label">śąźšļ§ťĘĚ</div><div class="stat-value">${fmtAmount(d.turnover)}</div></div>
            <div class="stat-box"><div class="stat-label">ŚłāÁõąÁéá</div><div class="stat-value">${d.pe||'-'}</div></div>
            <div class="stat-box"><div class="stat-label">śÄĽŚłāŚÄľ</div><div class="stat-value">${d.marketCap?fmtAmount(+d.marketCap):'-'}</div></div>
        `;
    } catch(e) {
        document.getElementById('modalName').textContent = 'Śä†ŤĹĹŚ§ĪŤī•';
    }
}

function closeModal() { document.getElementById('stockModal').classList.remove('show'); }
document.getElementById('stockModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ‚ĒÄ‚ĒÄ Search: Sina suggest sets global var ‚ĒÄ‚ĒÄ
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    if (!q) { document.getElementById('searchResults').classList.remove('show'); return; }
    searchTimer = setTimeout(async () => {
        try {
            await loadScript(`https://suggest3.sinajs.cn/suggest/type=&key=${encodeURIComponent(q)}`);
            const raw = window.suggestvalue;
            const el = document.getElementById('searchResults');
            if (!raw) { el.classList.remove('show'); return; }
            const results = [];
            for (const item of raw.split(';').filter(Boolean)) {
                const p = item.split(',');
                if (p.length >= 5 && (p[3] === 'sh' || p[3] === 'sz') && /^\d{6}$/.test(p[4])) {
                    results.push({ code: p[3] + p[4], name: p[1] });
                }
            }
            if (!results.length) { el.classList.remove('show'); return; }
            el.innerHTML = results.slice(0, 8).map(s =>
                `<div class="search-item" onclick="searchPick('${s.code}','${s.name}')"><span class="name">${s.name}</span><span class="code">${s.code}</span></div>`
            ).join('');
            el.classList.add('show');
        } catch(e) {}
    }, 300);
});
function searchPick(code, name) {
    document.getElementById('searchResults').classList.remove('show');
    document.getElementById('searchInput').value = '';
    openStockFull(code, name);
}
document.addEventListener('click', e => { if (!e.target.closest('.search-bar')) document.getElementById('searchResults').classList.remove('show'); });

// ‚ĒÄ‚ĒÄ Tabs ‚ĒÄ‚ĒÄ
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${name}`));
    if (name === 'flow') loadMoneyFlow();
    if (name === 'hot') loadHot();
}

// ‚ĒÄ‚ĒÄ Sort ‚ĒÄ‚ĒÄ
document.querySelectorAll('.sort-btn').forEach(btn => btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    state.currentSort = this.dataset.sort;
    renderSectors();
}));

// ‚ĒÄ‚ĒÄ Refresh ‚ĒÄ‚ĒÄ
async function refreshAll() {
    document.getElementById('autoStatus').textContent = 'Śą∑śĖįšł≠...';
    await Promise.allSettled([loadIndices(), loadSectors()]);
    const tab = document.querySelector('.tab.active')?.dataset.tab;
    if (tab === 'flow') loadMoneyFlow();
    if (tab === 'hot') loadHot();
}

// ‚ĒÄ‚ĒÄ Init ‚ĒÄ‚ĒÄ
refreshAll();
setInterval(() => {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    const trading = (h === 9 && m >= 30) || (h >= 10 && h < 11) || (h === 11 && m <= 30) || (h >= 13 && h < 15);
    if (trading) refreshAll();
}, 30000);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
